name: CI

on:
  push:
    branches: [ main ]
  pull_request:

env:
  ZIG_VERSION: "0.15.2"

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        run: |
          curl -sfL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          tar xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> $GITHUB_PATH

      - uses: oven-sh/setup-bun@v2

      - name: Install bridge dependencies
        run: bun install
        working-directory: bridge

      - name: Build bridge
        run: bun run build:bridge

      - name: Build
        run: zig build -Doptimize=ReleaseSafe

      - name: Test
        run: zig test src/main.zig
