name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    strategy:
      matrix:
        os:
          - macos-15
          - macos-26
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode 26
        run: |
          XCODE_APP="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V | tail -1)"
          if [[ -z "${XCODE_APP:-}" ]]; then
            echo "Xcode 26 not found on this runner."
            exit 1
          fi

          sudo xcode-select -s "${XCODE_APP}/Contents/Developer"
          xcodebuild -version
          xcodebuild -version | grep '^Xcode 26' >/dev/null

      - name: Build app
        run: |
          xcodebuild -project "clients/Poke macOS Around/Poke macOS Around.xcodeproj" \
            -scheme "Poke macOS Around" \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            clean build

  release:
    needs: verify
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "number=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update app version in Xcode project
        run: |
          sed -i '' "s/MARKETING_VERSION = .*;/MARKETING_VERSION = ${{ steps.version.outputs.number }};/g" "clients/Poke macOS Around/Poke macOS Around.xcodeproj/project.pbxproj"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "clients/Poke macOS Around/Poke macOS Around.xcodeproj/project.pbxproj"
          git commit -m "Bump version to ${{ steps.version.outputs.number }}" || echo "No changes to commit"
          git push origin HEAD:refs/heads/main || echo "Push skipped"

      - name: Select Xcode 26
        run: |
          XCODE_APP="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V | tail -1)"
          if [[ -z "${XCODE_APP:-}" ]]; then
            echo "Xcode 26 not found on this runner."
            exit 1
          fi

          sudo xcode-select -s "${XCODE_APP}/Contents/Developer"
          xcodebuild -version
          xcodebuild -version | grep '^Xcode 26' >/dev/null

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build bridge and CLI binaries
        run: |
          bun run release

      - name: Build universal app
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload binaries and DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release/Poke.macOS.Gate.dmg
            zig-out/release/linux-x86_64/poke-around
            zig-out/release/linux-aarch64/poke-around
            zig-out/release/windows-x86_64/poke-around.exe
            zig-out/release/macos-x86_64/poke-around
            zig-out/release/macos-aarch64/poke-around
          name: Poke Around ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Installation

            1. Download **Poke.macOS.Gate.dmg** below
            2. Open the DMG and drag **Poke macOS Around** to Applications
            3. Since the app is not notarized, macOS may block it on first launch. Run:

            ```
            xattr -cr /Applications/Poke\ macOS\ Gate.app
            ```

            Then open Poke macOS Around from your menu bar.

            Or install via Homebrew:

            ```
            brew install f/tap/poke-around
            ```

            ## CLI alternative

            ```
            npx poke-around
            ```

      - name: Compute DMG SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 'build/release/Poke.macOS.Gate.dmg' | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew Cask tap
        env:
          TAP_REPO_TOKEN_HOMEBREW: ${{ secrets.TAP_REPO_TOKEN_HOMEBREW }}
          VERSION: ${{ steps.version.outputs.tag }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          if [[ -z "${TAP_REPO_TOKEN_HOMEBREW:-}" ]]; then
            echo "Skipping Homebrew tap update because TAP_REPO_TOKEN_HOMEBREW is not set."
            exit 0
          fi

          VERSION_NUM="${VERSION#v}"
          git clone https://x-access-token:${TAP_REPO_TOKEN_HOMEBREW}@github.com/f/homebrew-tap.git tap
          mkdir -p tap/Casks
          cat > tap/Casks/poke-around.rb << EOF
          cask "poke-around" do
            version "${VERSION_NUM}"
            sha256 "${SHA256}"

            url "https://github.com/f/poke-around/releases/download/${VERSION}/Poke.macOS.Gate.dmg"
            name "Poke Around"
            desc "macOS menu bar app to expose your machine to your Poke AI assistant"
            homepage "https://github.com/f/poke-around"

            depends_on macos: ">= :sequoia"

            app "Poke macOS Around.app"

            postflight do
              system_command "/usr/bin/xattr", args: ["-cr", "#{appdir}/Poke macOS Around.app"]
            end

            zap trash: [
              "~/Library/Preferences/dev.fka.Poke-macOS-Gate.plist",
              "~/Library/Saved Application State/dev.fka.Poke-macOS-Gate.savedState",
              "~/.config/poke-around",
            ]
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update poke-around to ${VERSION}"
          git push
