name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # Build the bridge JS once (platform-independent)
  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install bridge deps
        run: bun install
        working-directory: bridge

      - name: Bundle bridge
        run: bun build bridge/poke-bridge.ts --bundle --target=node --outfile bridge/dist/poke-around-bridge.js

      - uses: actions/upload-artifact@v4
        with:
          name: bridge-js
          path: bridge/dist/poke-around-bridge.js

  # Build native binary per platform
  build:
    needs: bridge
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macos-aarch64
            zig_target: aarch64-macos
          - os: macos-latest
            name: macos-x86_64
            zig_target: x86_64-macos
          - os: ubuntu-latest
            name: linux-x86_64
            zig_target: x86_64-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - uses: actions/download-artifact@v4
        with:
          name: bridge-js
          path: bridge/dist

      - name: Build
        run: zig build -Dtarget=${{ matrix.zig_target }} -Doptimize=ReleaseSafe

      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/poke-around dist/
          cp bridge/dist/poke-around-bridge.js dist/
          if [ -f src/menubar_linux.py ]; then cp src/menubar_linux.py dist/; fi
          tar -czf poke-around-${{ matrix.name }}.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: poke-around-${{ matrix.name }}.tar.gz

  # Create GitHub release and update homebrew tap
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "poke-around ${{ github.ref_name }}" \
            --generate-notes \
            release-assets/*.tar.gz
